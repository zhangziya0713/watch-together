<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>放映厅 · 私密同步观影</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- 入场界面 -->
<div id="join-screen" class="screen">
  <div class="join-card">
    <div class="reel-icon">◎</div>
    <h1>放映厅</h1>
    <p class="tagline">留空房间码 = 创建新房间并自动成为房主</p>

    <label class="field-label">你的名字</label>
    <input id="name-input" type="text" maxlength="16" placeholder="怎么称呼你" />

    <label class="field-label">房间码</label>
    <input id="room-input" type="text" maxlength="12" placeholder="输入已有房间码,或留空创建新房间" />

    <button id="enter-btn" class="btn-primary">进入放映厅</button>
    <p class="hint" id="join-hint"></p>
  </div>
</div>

<!-- 放映厅主界面 -->
<div id="room-screen" class="screen" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <span class="reel-icon-sm">◎</span>
      <span class="brand-text">放映厅</span>
    </div>
    <div class="room-code-wrap">
      <span class="room-code-label">房间码</span>
      <span id="room-code-display" class="room-code"></span>
      <button id="copy-link-btn" class="btn-ghost">复制邀请链接</button>
    </div>
    <div class="mic-controls">
      <button id="mic-toggle" class="btn-mic">🎤 开启麦克风</button>
      <button id="logout-btn" class="btn-ghost">退出登录</button>
    </div>
  </header>

  <main class="main-grid">
    <section class="video-panel">

      <!-- 房主专属:视频源选择,普通观众看不到这块 -->
      <div id="host-controls" class="host-controls" style="display:none;">
        <p class="host-controls-title">👑 你是房主 · 选一个视频源</p>

        <div class="source-row">
          <input id="yt-url-input" type="text" placeholder="粘贴 YouTube 链接..." />
          <button id="yt-load-btn" class="btn-secondary">加载</button>
        </div>
        <div class="source-row">
          <input id="direct-url-input" type="text" placeholder="粘贴直接视频文件链接(.mp4/.webm 结尾)..." />
          <button id="direct-load-btn" class="btn-secondary">加载</button>
        </div>
        <div class="source-row">
          <input id="upload-input" type="file" accept="video/*" />
          <button id="upload-btn" class="btn-secondary">上传并播放</button>
        </div>
        <p id="upload-status" class="upload-status"></p>
        <button id="open-library-btn" class="btn-secondary library-open-btn">📚 从片库选择</button>
        <p class="host-note">网页链接(B站/腾讯视频等)浏览器技术上无法程序控制进度,建议用上面的直接文件链接或直接上传视频文件,才能做到精确同步。</p>
      </div>

      <div class="player-frame">
        <div id="player-mount"></div>
        <div id="player-placeholder" class="player-placeholder">
          <div class="reel-icon-lg">◎</div>
          <p id="placeholder-text">等待视频加载...</p>
        </div>
      </div>

      <!-- 聊天区,紧跟在视频下面 -->
      <div class="chat-block">
        <h3>留言板 / 聊天</h3>
        <div id="chat-log" class="chat-log"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="说点什么..." />
          <button id="chat-send-btn" class="btn-secondary">发送</button>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <div class="participants-block">
        <h3>在场的人 <span id="participant-count">(1)</span></h3>
        <ul id="participant-list" class="participant-list"></ul>
      </div>
    </aside>
  </main>
</div>

<!-- 片库选择弹窗 -->
<div id="library-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h2>从片库选择</h2>
      <button id="close-library-btn" class="btn-ghost">✕</button>
    </div>
    <div id="library-modal-grid" class="library-grid"></div>
  </div>
</div>

<!-- 远端语音音轨挂载点(不可见) -->
<div id="audio-sinks" style="display:none;"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="/client.js"></script>
</body>
</html>
