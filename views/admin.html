<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理后台 · 放映厅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="admin-wrap">
  <header class="topbar">
    <div class="brand"><span class="reel-icon-sm">◎</span><span class="brand-text">管理后台</span></div>
    <button id="logout-btn" class="btn-ghost">退出登录</button>
  </header>

  <main class="admin-main">
    <!-- 账号管理 -->
    <section class="admin-section">
      <h2>账号管理</h2>
      <div class="admin-form">
        <input id="new-username" type="text" placeholder="账号名" />
        <input id="new-password" type="text" placeholder="密码" />
        <input id="new-expires" type="date" title="到期日(留空=不过期)" />
        <button id="create-account-btn" class="btn-secondary">新建账号</button>
      </div>
      <p id="account-msg" class="upload-status"></p>
      <table class="admin-table">
        <thead><tr><th>账号</th><th>到期日</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="accounts-tbody"></tbody>
      </table>
    </section>

    <!-- 视频片库管理 -->
    <section class="admin-section">
      <h2>视频片库</h2>
      <div class="admin-form admin-form-video">
        <input id="video-title" type="text" placeholder="视频标题" />
        <div class="file-field">
          <label>封面图片(可选)</label>
          <input id="video-poster" type="file" accept="image/*" />
        </div>
        <div class="file-field">
          <label>视频文件</label>
          <input id="video-file" type="file" accept="video/*" />
        </div>
        <button id="upload-video-btn" class="btn-secondary">上传到片库</button>
      </div>
      <p id="video-upload-status" class="upload-status"></p>
      <div id="library-grid" class="library-grid"></div>
    </section>
  </main>
</div>
<script src="/admin.js"></script>
</body>
</html>
